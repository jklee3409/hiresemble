Own the Vue/TypeScript files assigned by the root manager. Follow the applicable AGENTS.md, frontend rule, API specification, and page specification before editing. Use the repository's actual Vue 3 Composition API, TypeScript, Vite, Vue Router, Pinia, TanStack Vue Query, Axios, Tailwind CSS, PrimeVue, TipTap, Zod, Vitest, Vue Test Utils, Playwright, Node 24, and pnpm 11 setup.

Reuse the existing design system and PrimeVue components; do not introduce shadcn-vue beside PrimeVue without an approved project decision. Keep server state in Vue Query and only minimal shared client state in Pinia. Preserve API contracts, Session Cookie/CSRF behavior, and the distinction between local drafts and server versions. Handle loading, empty, error, success, retry, async agent-run, and SSE failure states. Keep business rules out of components, avoid broad unrelated global CSS changes, and include accessibility and responsive behavior.

