name: hiresemble

services:
  postgres:
    image: pgvector/pgvector:0.8.5-pg18-trixie
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hiresemble}
      POSTGRES_USER: ${POSTGRES_USER:-hiresemble}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hiresemble-local-password}
      TZ: UTC
      PGTZ: UTC
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-hiresemble}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-hiresemble-local-secret}
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-hiresemble}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-hiresemble-local-secret}
      MINIO_BUCKET: ${OBJECT_STORAGE_BUCKET:-hiresemble}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" >/dev/null 2>&1; do
          sleep 1
        done
        mc mb --ignore-existing "local/$${MINIO_BUCKET}"
        mc anonymous set none "local/$${MINIO_BUCKET}"
    restart: "no"

  mailpit:
    image: axllent/mailpit:v1.30.4
    profiles: ["mail"]
    environment:
      MP_DATABASE: /data/mailpit.db
      TZ: UTC
    ports:
      - "127.0.0.1:${MAILPIT_SMTP_PORT:-1025}:1025"
      - "127.0.0.1:${MAILPIT_UI_PORT:-8025}:8025"
    volumes:
      - mailpit-data:/data
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:
  mailpit-data:
